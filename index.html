<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محلل الأجنة الاحترافي | Gemini 2.5</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f0f4f8; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-2xl w-full glass rounded-[2rem] shadow-2xl p-8 md:p-12 transition-all">
        <div class="text-center mb-10">
            <div class="inline-block p-4 bg-blue-50 rounded-full mb-4">
                <i class="fas fa-microscope text-4xl text-blue-600"></i>
            </div>
            <h1 class="text-3xl font-bold text-slate-800 mb-2">محلل الأجنة الذكي</h1>
            <span class="px-4 py-1 bg-blue-100 text-blue-700 rounded-full text-sm font-bold">Engine: Gemini 2.5 Flash (v1beta)</span>
        </div>

        <div id="dropzone" onclick="document.getElementById('fileInput').click()" 
             class="border-4 border-dashed border-slate-200 rounded-3xl p-10 text-center cursor-pointer hover:border-blue-400 hover:bg-blue-50 transition-all mb-8">
            <input type="file" id="fileInput" accept=".bmp,image/*" class="hidden" onchange="handleFile(this)">
            <div id="uploadUI">
                <i class="fas fa-cloud-upload-alt text-5xl text-slate-400 mb-4"></i>
                <p class="text-slate-600 font-bold text-lg">اسحب صورة الجنين هنا أو اضغط للرفع</p>
                <p class="text-slate-400 text-sm mt-2">يدعم بشكل كامل صيغ BMP, JPG, PNG</p>
            </div>
            <img id="imagePreview" src="#" class="hidden max-h-64 mx-auto rounded-2xl shadow-lg border-2 border-white">
        </div>

        <button id="analyzeBtn" onclick="runAnalysis()" disabled
                class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 text-white font-bold py-5 rounded-2xl text-xl shadow-lg transition-all active:scale-95 flex justify-center items-center gap-3">
            <i class="fas fa-wand-magic-sparkles"></i>
            <span>بدء التحليل المخبري</span>
        </button>

        <div id="loadingBox" class="hidden mt-10 text-center">
            <div class="loader w-12 h-12 border-4 border-slate-200 rounded-full mx-auto mb-4"></div>
            <p class="text-blue-600 font-bold animate-pulse">جاري فحص الجنين عبر محرك 2.5...</p>
        </div>

        <div id="resultBox" class="hidden mt-10 p-6 bg-slate-50 rounded-2xl border-r-8 border-blue-500 shadow-inner">
            <h3 class="text-blue-800 font-bold mb-4 flex items-center gap-2">
                <i class="fas fa-clipboard-check"></i> تقرير المختبر الرقمي:
            </h3>
            <div id="resultContent" class="text-slate-700 leading-relaxed text-right whitespace-pre-wrap"></div>
        </div>
    </div>

    <script>
        // كابتن، تأكد من صحة المفتاح
        const API_KEY = "AIzaSyAaA9oAdaQ98jlbHFy0RaqLqovMbteNoGc";
        const MODEL = "gemini-2.5-flash"; 

        let base64Image = "";
        let mimeType = "";

        function handleFile(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                mimeType = file.type || "image/bmp"; // تخصيص يدوي للـ BMP إذا لم يتعرف عليه المتصفح
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('imagePreview').src = e.target.result;
                    document.getElementById('imagePreview').classList.remove('hidden');
                    document.getElementById('uploadUI').classList.add('hidden');
                    document.getElementById('analyzeBtn').disabled = false;
                    document.getElementById('resultBox').classList.add('hidden');
                    base64Image = e.target.result.split(',')[1];
                }
                reader.readAsDataURL(file);
            }
        }

        async function runAnalysis() {
            const btn = document.getElementById('analyzeBtn');
            const loading = document.getElementById('loadingBox');
            const resultBox = document.getElementById('resultBox');
            const resultContent = document.getElementById('resultContent');

            btn.disabled = true;
            loading.classList.remove('hidden');
            resultBox.classList.add('hidden');

            const prompt = `أنت خبير أجنة رقمي. حلل هذه الصورة بدقة مجهرية.
            المطلوب تقرير مفصل باللغة العربية يتضمن:
            1. مرحلة نمو الجنين.
            2. جودة الخلايا والتناظر (Symmetry).
            3. نسبة التكسر (Fragmentation).
            4. تقييم نهائي للجودة (Grading).
            إذا كانت الصورة غير واضحة أو ليست لجنين، اطلب صورة أوضح.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: prompt },
                                { inline_data: { mime_type: mimeType, data: base64Image } }
                            ]
                        }]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(`خطأ من السيرفر: ${data.error.message}`);
                }

                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    resultContent.innerText = data.candidates[0].content.parts[0].text;
                    resultBox.classList.remove('hidden');
                } else {
                    throw new Error("لم يتمكن المحرك من قراءة الصورة، قد تكون الصيغة أو الحجم غير مدعوم.");
                }

            } catch (error) {
                alert("حدث خطأ تقني:\n" + error.message);
                console.error(error);
            } finally {
                loading.classList.add('hidden');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
