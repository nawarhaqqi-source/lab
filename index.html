<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الصالة</title>
    <style>
        :root {
            --sidebar-width: 260px;
            --primary-color: #2c3e50;
            --lab1-color: #3498db;
            --lab2-color: #9b59b6;
            --bg-color: #f0f2f5;
            --accent-color: #1abc9c;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg-color); overflow: hidden; flex-direction: row; }

        .sidebar { width: var(--sidebar-width); background: var(--primary-color); color: white; display: flex; flex-direction: column; padding: 20px 0; box-shadow: 2px 0 10px rgba(0,0,0,0.2); z-index: 100; }
        .sidebar h2 { text-align: center; font-size: 1.2rem; border-bottom: 1px solid #444; padding-bottom: 20px; margin-bottom: 10px; }
        .sidebar-btn { background: none; border: none; color: #bdc3c7; padding: 18px 25px; text-align: right; cursor: pointer; width: 100%; transition: 0.3s; font-size: 1.1rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sidebar-btn:hover, .sidebar-btn.active { background: #34495e; color: white; border-right: 8px solid var(--accent-color); }

        .main-content { 
            flex-grow: 1; 
            padding: 20px; 
            overflow-y: auto; 
            width: 100%; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
        }

        .mini-monitor {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            width: 100%;
            max-width: 400px;
        }
        .mini-card {
            flex: 1;
            background: white;
            padding: 5px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .mini-val { font-size: 1.2rem; font-weight: bold; }

        .quick-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            width: 100%;
            max-width: 400px;
        }
        .nav-tab {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            background: #ddd;
            transition: 0.3s;
        }
        .nav-tab.active-1 { background: var(--lab1-color); color: white; }
        .nav-tab.active-2 { background: var(--lab2-color); color: white; }

        .page-section { 
            display: none; 
            animation: fadeIn 0.4s; 
            width: 100%;
            max-width: 400px; 
        }
        .page-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .lab-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        
        /* تصميم حقل الإدخال مع الأسهم */
        .grid { display: flex; gap: 10px; margin-top: 15px; align-items: center; justify-content: center; }
        .input-wrapper { display: flex; align-items: center; background: #eee; border-radius: 10px; overflow: hidden; }
        .manual-input { padding: 8px; font-size: 1.5rem; border: none; width: 70px; text-align: center; background: white; }
        .step-btn { background: #ddd; border: none; padding: 10px 15px; cursor: pointer; font-weight: bold; font-size: 1.2rem; transition: 0.2s; }
        .step-btn:hover { background: #ccc; }
        
        .btn-input { padding: 10px 20px; font-size: 1.1rem; font-weight: bold; cursor: pointer; border-radius: 10px; border: none; color: white; transition: 0.2s; }
        .btn-input:active { transform: scale(0.95); }

        .display-screen { display: flex; flex-direction: row; gap: 20px; justify-content: center; align-items: center; width: 100%; }
        .counter-box { flex: 1; background: white; padding: 30px; border-radius: 25px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 20px solid #ddd; }
        .box-lab1 { border-top-color: var(--lab1-color); }
        .box-lab2 { border-top-color: var(--lab2-color); }
        .val { font-size: clamp(6rem, 20vw, 18rem); font-weight: 900; line-height: 1; margin: 15px 0; }
        
        #stop-sound-btn { display: none; width: 100%; padding: 20px; background: #e74c3c; color: white; font-size: 1.8rem; font-weight: bold; border: none; border-radius: 15px; cursor: pointer; margin-top: 25px; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; flex-direction: row; padding: 0; overflow-x: auto; }
            .sidebar h2 { display: none; }
            .sidebar-btn { padding: 15px; text-align: center; font-size: 0.9rem; border-bottom: none; border-left: 1px solid rgba(255,255,255,0.1); width: auto; flex-shrink: 0; }
            .display-screen { flex-direction: column; }
            .val { font-size: 10rem; }
            .main-content { justify-content: flex-start; padding-top: 20px; }
        }

        .update-flash { animation: flash 0.6s ease-out; }
        @keyframes flash { 50% { background: #fff9c4; transform: scale(1.02); } }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>🏥 إدارة الصالة</h2>
        <button id="side-btn-1" class="sidebar-btn active" onclick="showPage('lab1-ui', this)"> صالة 1</button>
        <button id="side-btn-2" class="sidebar-btn" onclick="showPage('lab2-ui', this)"> صالة 2</button>
        <button id="side-btn-hall" class="sidebar-btn" onclick="showPage('hall-ui', this)">🖥️ الشاشة</button>
    </div>

    <div class="main-content">
        <div id="input-controls" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
            <div class="mini-monitor">
                <div class="mini-card" style="border-right: 5px solid var(--lab1-color)">
                    <small>صالة 1</small>
                    <div id="mini-res-1" class="mini-val" style="color: var(--lab1-color)">0</div>
                </div>
                <div class="mini-card" style="border-right: 5px solid var(--lab2-color)">
                    <small>صالة 2</small>
                    <div id="mini-res-2" class="mini-val" style="color: var(--lab2-color)">0</div>
                </div>
            </div>

            <div class="quick-nav">
                <button id="nav-1" class="nav-tab active-1" onclick="showPage('lab1-ui', document.getElementById('side-btn-1'))">صالة 1</button>
                <button id="nav-2" class="nav-tab" onclick="showPage('lab2-ui', document.getElementById('side-btn-2'))">صالة 2</button>
            </div>
        </div>

        <div id="lab1-ui" class="page-section active">
            <div class="lab-card">
                <h3 style="color: var(--lab1-color); margin: 0;">صالة 1</h3>
                <div class="grid">
                    <div class="input-wrapper">
                        <button class="step-btn" onclick="stepInput('input-bio1', -1)">-</button>
                        <input type="number" id="input-bio1" class="manual-input" value="0">
                        <button class="step-btn" onclick="stepInput('input-bio1', 1)">+</button>
                    </div>
                    <button class="btn-input" style="background: var(--lab1-color)" onclick="sendToHall(1, 'input-bio1')">ارسال</button>
                </div>
            </div>
        </div>

        <div id="lab2-ui" class="page-section">
            <div class="lab-card">
                <h3 style="color: var(--lab2-color); margin: 0;">صالة 2</h3>
                <div class="grid">
                    <div class="input-wrapper">
                        <button class="step-btn" onclick="stepInput('input-bio2', -1)">-</button>
                        <input type="number" id="input-bio2" class="manual-input" value="0">
                        <button class="step-btn" onclick="stepInput('input-bio2', 1)">+</button>
                    </div>
                    <button class="btn-input" style="background: var(--lab2-color)" onclick="sendToHall(2, 'input-bio2')">ارسال</button>
                </div>
            </div>
        </div>

        <div id="hall-ui" class="page-section" style="max-width: 100%;">
            <div class="display-screen">
                <div id="card1" class="counter-box box-lab1"><div>صالة 1</div><div id="res-lab1" class="val" style="color: var(--lab1-color)">0</div></div>
                <div id="card2" class="counter-box box-lab2"><div>صالة 2</div><div id="res-lab2" class="val" style="color: var(--lab2-color)">0</div></div>
            </div>
            <button id="stop-sound-btn" onclick="stopAlertSound()">إيقاف التنبيه 🔊</button>
        </div>
    </div>

    <script>
        let audioCtx = null;
        let oscillator = null;
        let isAlerting = false;

        function showPage(id, btn) {
            document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');

            const controls = document.getElementById('input-controls');
            if (id === 'hall-ui') {
                controls.style.display = 'none';
            } else {
                controls.style.display = 'flex';
                document.getElementById('nav-1').classList.toggle('active-1', id === 'lab1-ui');
                document.getElementById('nav-2').classList.toggle('active-2', id === 'lab2-ui');
            }
        }

        // وظيفة لزيادة أو تقليل الرقم
        function stepInput(inputId, amount) {
            const input = document.getElementById(inputId);
            let val = parseInt(input.value) || 0;
            val += amount;
            if (val < 0) val = 0; // منع الأرقام السالبة
            input.value = val;
        }

        function startAlertSound() {
            if (isAlerting) return;
            isAlerting = true;
            document.getElementById('stop-sound-btn').style.display = 'block';
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            setTimeout(() => stopAlertSound(), 1500);
        }

        function stopAlertSound() {
            if (oscillator) { try { oscillator.stop(); } catch(e) {} oscillator = null; }
            isAlerting = false;
            document.getElementById('stop-sound-btn').style.display = 'none';
        }

        function sendToHall(bioId, inputId) {
            const inputElement = document.getElementById(inputId);
            const count = inputElement.value;

            const formData = new FormData();
            formData.append('id', bioId);
            formData.append('val', count);
            
            fetch('data.php', { method: 'POST', body: formData })
            .then(() => { 
                if (navigator.vibrate) navigator.vibrate(50);
                // تصفير العداد بعد الإرسال الناجح
                inputElement.value = 0;
            })
            .catch(err => console.error("خطأ في الإرسال"));
        }

        function updateDisplay() {
            fetch('data.php?t=' + Date.now())
            .then(res => res.json())
            .then(data => {
                const el1 = document.getElementById('res-lab1');
                const el2 = document.getElementById('res-lab2');
                const mini1 = document.getElementById('mini-res-1');
                const mini2 = document.getElementById('mini-res-2');
                
                let changed = false;

                if(mini1.innerText.trim() !== data.bio1.toString().trim()) { 
                    el1.innerText = data.bio1; 
                    mini1.innerText = data.bio1;
                    changed = true; 
                }
                if(mini2.innerText.trim() !== data.bio2.toString().trim()) { 
                    el2.innerText = data.bio2; 
                    mini2.innerText = data.bio2;
                    changed = true; 
                }

                if (changed && document.getElementById('hall-ui').classList.contains('active')) {
                    startAlertSound();
                    document.querySelectorAll('.counter-box').forEach(b => b.classList.add('update-flash'));
                    setTimeout(() => document.querySelectorAll('.counter-box').forEach(b => b.classList.remove('update-flash')), 600);
                }
            })
            .catch(err => console.log("جاري الاتصال بالسيرفر..."));
        }

        setInterval(updateDisplay, 1000);

        document.body.addEventListener('click', () => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }, {once: true});
    </script>
</body>
</html>
